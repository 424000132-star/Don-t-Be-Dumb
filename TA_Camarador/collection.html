<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTION | DON'T BE DUMB.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --v-black: #121212; 
            --v-gray-light: #f4f4f4; 
            --v-gray-dark: #666666;
            --v-border-bold: #121212; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: var(--v-black); 
            margin: 0;
            padding: 0;
            background-image: url('YOUR_BACKDROP_IMAGE.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); 
            z-index: -1;
        }
  
        .navbar { 
            padding: 2rem 0; 
            border: 5px solid var(--v-border-bold);
            margin: 20px;
            background: rgba(255, 255, 255, 0.95) !important; 
        }
        
        .navbar-brand { 
            font-weight: 800; 
            font-size: 2.5rem; /* Enlarged Title */
            letter-spacing: -1px; 
            text-transform: uppercase; 
            padding-left: 20px;
        }
        
        .nav-item { margin-right: 15px; }
        
        .nav-link { 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border: 3px solid var(--v-black);
            padding: 15px 30px !important; /* Matches Index button size */
            transition: all 0.3s ease;
            font-weight: 700;
            background: white;
            color: var(--v-black) !important;
        }
        
        .nav-link:hover, .nav-link.active { 
            background: var(--v-black); 
            color: #fff !important; 
        }

        .history-section {
            padding: 80px 0;
            background-color: rgba(244, 244, 244, 0.9);
            border-top: 4px solid var(--v-black);
            border-bottom: 4px solid var(--v-black);
            margin: 40px 0;
        }

        .section-title {
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            background: white;
            display: table;
            margin-left: auto; margin-right: auto;
            padding: 10px 25px;
            border: 2px solid black;
        }

        .product-card { 
            border: 2px solid var(--v-black); 
            background: white;
            transition: transform 0.3s ease; 
            text-decoration: none; 
            color: inherit; 
            display: block;
            padding: 15px;
        }

        .product-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 1);
        }

        .img-container {
            background-color: var(--v-gray-light);
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
            border-bottom: 1px solid #000;
        }

        .img-container img {
            max-width: 100%;
            height: auto;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }

        .product-card:hover img {
            filter: grayscale(0%);
        }

        .product-info {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding-top: 5px;
        }

        .price {
            color: var(--v-black);
            font-weight: 600;
        }

        footer {
            border-top: 4px solid var(--v-black);
            margin: 40px 20px 20px 20px;
            padding: 20px 0;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 2px;
            background: white;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">DON'T BE DUMB.</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="collection.html">Collections</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title">Essential Series</h2>
        
        <div class="row">
            <div class="col-md-4">
                <a href="#" class="product-card">
                    <div class="img-container">
                        <img src="YOUR_IMAGE_1.jpg" alt="Blue Denim">
                    </div>
                    <div class="product-info">
                        <div class="fw-bold">Blue Denim</div>
                        <div class="price">₱3000.00</div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="#" class="product-card">
                    <div class="img-container">
                        <img src="YOUR_IMAGE_2.jpg" alt="Camou Long Sleeves">
                    </div>
                    <div class="product-info">
                        <div class="fw-bold">Camou Long Sleeves</div>
                        <div class="price">₱1500.00</div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="#" class="product-card">
                    <div class="img-container">
                        <img src="YOUR_IMAGE_3.jpg" alt="Checkered Hoodie">
                    </div>
                    <div class="product-info">
                        <div class="fw-bold">Checkered Hoodie</div>
                        <div class="price">₱25000.00</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-4">
                <a href="#" class="product-card">
                    <div class="img-container">
                        <img src="YOUR_IMAGE_4.jpg" alt="Camou Jorts">
                    </div>
                    <div class="product-info">
                        <div class="fw-bold">Camou Jorts</div>
                        <div class="price">$2000.00</div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="#" class="product-card">
                    <div class="img-container">
                        <img src="YOUR_IMAGE_5.jpg" alt="Bootcut Jeans">
                    </div>
                    <div class="product-info">
                        <div class="fw-bold">Bootcut Jeans</div>
                        <div class="price">$1500.00</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 DON'T BE DUMB. STUDIO — ALL RIGHTS RESERVED | CREATED BY RANIEL PIOLLO CAMARADOR
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
